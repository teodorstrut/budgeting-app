<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Manage Categories</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "secondary-fixed-dim": "#ffb866",
            "primary-container": "#4fd1c5",
            "on-surface-variant": "#bbc9c7",
            "tertiary-fixed-dim": "#ffb0cc",
            "on-surface": "#dde2f3",
            "surface-container": "#1a202c",
            "error": "#ffb4ab",
            "surface-bright": "#333946",
            "surface-variant": "#2f3542",
            "on-primary": "#003733",
            "background": "#0d131f",
            "secondary": "#ffb866",
            "on-secondary-container": "#ffe3c9",
            "on-primary-container": "#005750",
            "on-error-container": "#ffdad6",
            "primary-fixed-dim": "#5adace",
            "primary-fixed": "#79f7ea",
            "surface": "#0d131f",
            "inverse-surface": "#dde2f3",
            "on-primary-fixed": "#00201d",
            "inverse-on-surface": "#2a303d",
            "on-tertiary": "#600b37",
            "tertiary": "#ffccdc",
            "surface-container-highest": "#2f3542",
            "on-tertiary-fixed": "#3e0021",
            "tertiary-container": "#ffa2c5",
            "tertiary-fixed": "#ffd9e4",
            "outline": "#869491",
            "surface-tint": "#5adace",
            "surface-container-high": "#242a36",
            "secondary-fixed": "#ffddba",
            "outline-variant": "#3c4947",
            "secondary-container": "#955b01",
            "inverse-primary": "#006a63",
            "on-tertiary-fixed-variant": "#7d254e",
            "surface-container-low": "#161c27",
            "error-container": "#93000a",
            "on-background": "#dde2f3",
            "surface-container-lowest": "#080e1a",
            "on-secondary-fixed": "#2b1700",
            "on-secondary": "#482900",
            "primary": "#6feee1",
            "on-error": "#690005",
            "surface-dim": "#0d131f",
            "on-primary-fixed-variant": "#00504a",
            "on-secondary-fixed-variant": "#673d00",
            "on-tertiary-container": "#842b54"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Plus Jakarta Sans"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    body {
      background-color: #0d131f;
      color: #dde2f3;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar Implementation from JSON -->
<header class="fixed top-0 w-full z-50 bg-surface-bright/60 backdrop-blur-xl">
<div class="flex items-center px-6 h-16 w-full max-w-7xl mx-auto">
<button class="mr-4 p-2 rounded-full hover:bg-[#333946]/50 transition-colors active:scale-95 duration-150 text-[#4fd1c5]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-xl font-bold text-white font-plus-jakarta-sans tracking-tight">Manage Categories</h1>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto min-h-screen pb-64">
<!-- Segmented Control Toggle -->
<div class="mb-10 bg-surface-container-low p-1.5 rounded-full flex items-center">
<button class="flex-1 py-3 px-6 rounded-full text-sm font-bold transition-all duration-300 text-on-surface-variant hover:text-white">
        Income
      </button>
<button class="flex-1 py-3 px-6 rounded-full text-sm font-bold transition-all duration-300 bg-gradient-to-br from-primary-container to-primary text-on-primary shadow-lg shadow-primary/10">
        Expenses
      </button>
</div>
<!-- Section Heading (Subtle) -->
<div class="flex items-center justify-between mb-6 px-2">
<h2 class="text-on-surface-variant font-semibold tracking-wide text-xs uppercase">Active Expense Categories</h2>
<span class="text-on-surface-variant text-[10px] font-medium px-2 py-0.5 rounded-full border border-outline-variant/20">7 TOTAL</span>
</div>
<!-- Category List (Main Canvas) -->
<div class="space-y-4">
<!-- Dining -->
<div class="flex items-center bg-surface-container-low p-4 rounded-full group hover:bg-surface-container-high transition-all border border-transparent hover:border-outline-variant/10">
<div class="w-12 h-12 rounded-full bg-secondary-container/20 flex items-center justify-center text-secondary mr-4">
<span class="material-symbols-outlined" data-icon="restaurant" data-weight="fill" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<div class="flex-1">
<p class="font-bold text-on-surface">Dining</p>
</div>
<button class="p-3 text-on-surface-variant hover:text-error transition-colors rounded-full hover:bg-error/10">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
<!-- Shopping -->
<div class="flex items-center bg-surface-container-low p-4 rounded-full group hover:bg-surface-container-high transition-all border border-transparent hover:border-outline-variant/10">
<div class="w-12 h-12 rounded-full bg-tertiary-container/20 flex items-center justify-center text-tertiary mr-4">
<span class="material-symbols-outlined" data-icon="shopping_bag" data-weight="fill" style="font-variation-settings: 'FILL' 1;">shopping_bag</span>
</div>
<div class="flex-1">
<p class="font-bold text-on-surface">Shopping</p>
</div>
<button class="p-3 text-on-surface-variant hover:text-error transition-colors rounded-full hover:bg-error/10">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
<!-- Travel -->
<div class="flex items-center bg-surface-container-low p-4 rounded-full group hover:bg-surface-container-high transition-all border border-transparent hover:border-outline-variant/10">
<div class="w-12 h-12 rounded-full bg-primary-container/20 flex items-center justify-center text-primary mr-4">
<span class="material-symbols-outlined" data-icon="flight" data-weight="fill" style="font-variation-settings: 'FILL' 1;">flight</span>
</div>
<div class="flex-1">
<p class="font-bold text-on-surface">Travel</p>
</div>
<button class="p-3 text-on-surface-variant hover:text-error transition-colors rounded-full hover:bg-error/10">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
<!-- Grocery -->
<div class="flex items-center bg-surface-container-low p-4 rounded-full group hover:bg-surface-container-high transition-all border border-transparent hover:border-outline-variant/10">
<div class="w-12 h-12 rounded-full bg-on-secondary-fixed-variant/20 flex items-center justify-center text-secondary-fixed-dim mr-4">
<span class="material-symbols-outlined" data-icon="shopping_cart" data-weight="fill" style="font-variation-settings: 'FILL' 1;">shopping_cart</span>
</div>
<div class="flex-1">
<p class="font-bold text-on-surface">Grocery</p>
</div>
<button class="p-3 text-on-surface-variant hover:text-error transition-colors rounded-full hover:bg-error/10">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
<!-- Fun -->
<div class="flex items-center bg-surface-container-low p-4 rounded-full group hover:bg-surface-container-high transition-all border border-transparent hover:border-outline-variant/10">
<div class="w-12 h-12 rounded-full bg-tertiary-fixed-dim/20 flex items-center justify-center text-tertiary-fixed-dim mr-4">
<span class="material-symbols-outlined" data-icon="sports_esports" data-weight="fill" style="font-variation-settings: 'FILL' 1;">sports_esports</span>
</div>
<div class="flex-1">
<p class="font-bold text-on-surface">Fun</p>
</div>
<button class="p-3 text-on-surface-variant hover:text-error transition-colors rounded-full hover:bg-error/10">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
<!-- Rent -->
<div class="flex items-center bg-surface-container-low p-4 rounded-full group hover:bg-surface-container-high transition-all border border-transparent hover:border-outline-variant/10">
<div class="w-12 h-12 rounded-full bg-primary-fixed-dim/20 flex items-center justify-center text-primary-fixed-dim mr-4">
<span class="material-symbols-outlined" data-icon="home" data-weight="fill" style="font-variation-settings: 'FILL' 1;">home</span>
</div>
<div class="flex-1">
<p class="font-bold text-on-surface">Rent</p>
</div>
<button class="p-3 text-on-surface-variant hover:text-error transition-colors rounded-full hover:bg-error/10">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
<!-- Utilities -->
<div class="flex items-center bg-surface-container-low p-4 rounded-full group hover:bg-surface-container-high transition-all border border-transparent hover:border-outline-variant/10">
<div class="w-12 h-12 rounded-full bg-secondary-fixed/20 flex items-center justify-center text-secondary-fixed mr-4">
<span class="material-symbols-outlined" data-icon="bolt" data-weight="fill" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<div class="flex-1">
<p class="font-bold text-on-surface">Utilities</p>
</div>
<button class="p-3 text-on-surface-variant hover:text-error transition-colors rounded-full hover:bg-error/10">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
</div>
<!-- Add New Category Field -->
<div class="fixed bottom-[100px] left-0 w-full px-6 z-40">
<div class="max-w-2xl mx-auto bg-surface/80 backdrop-blur-lg py-4 rounded-t-3xl">
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-6">
<span class="material-symbols-outlined text-primary" data-icon="add_circle">add_circle</span>
</div>
<input class="w-full bg-surface-container-highest border-0 py-5 pl-14 pr-6 rounded-full focus:ring-2 focus:ring-primary text-on-surface placeholder:text-on-surface-variant/50 font-medium transition-all shadow-xl" placeholder="Add New Category" type="text"/>
<div class="absolute inset-y-0 right-4 flex items-center">
<button class="bg-primary/10 text-primary p-2 rounded-full hover:bg-primary/20 transition-all">
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar Implementation from JSON -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#0d131f] rounded-t-[32px] z-50 shadow-[0_-8px_48px_rgba(111,238,225,0.08)]">
<div class="flex flex-col items-center justify-center text-[#bbc9c7] px-5 py-2 hover:text-white transition-all cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="text-[11px] font-semibold font-plus-jakarta-sans">Budget</span>
</div>
<div class="flex flex-col items-center justify-center text-[#bbc9c7] px-5 py-2 hover:text-white transition-all cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="query_stats">query_stats</span>
<span class="text-[11px] font-semibold font-plus-jakarta-sans">Trends</span>
</div>
<div class="flex flex-col items-center justify-center bg-gradient-to-br from-[#4fd1c5] to-[#6feee1] text-[#003733] rounded-full px-5 py-2 active:scale-90 duration-200 cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="category">category</span>
<span class="text-[11px] font-semibold font-plus-jakarta-sans">Categories</span>
</div>
<div class="flex flex-col items-center justify-center text-[#bbc9c7] px-5 py-2 hover:text-white transition-all cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="text-[11px] font-semibold font-plus-jakarta-sans">Profile</span>
</div>
</nav>
<!-- Visual Background Accents -->
<div class="fixed top-[-10%] right-[-10%] w-[50%] h-[40%] bg-primary/5 blur-[120px] rounded-full -z-10 pointer-events-none"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[40%] h-[30%] bg-secondary/5 blur-[100px] rounded-full -z-10 pointer-events-none"></div>
</body></html>
