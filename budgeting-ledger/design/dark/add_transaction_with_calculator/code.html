<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ledger - Add Transaction</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-dim": "#0d131f",
                        "inverse-primary": "#006a63",
                        "tertiary": "#ffccdc",
                        "tertiary-container": "#ffa2c5",
                        "on-primary": "#003733",
                        "on-secondary": "#482900",
                        "surface-container-high": "#242a36",
                        "on-background": "#dde2f3",
                        "error-container": "#93000a",
                        "on-secondary-fixed": "#2b1700",
                        "on-tertiary": "#600b37",
                        "tertiary-fixed": "#ffd9e4",
                        "secondary-fixed": "#ffddba",
                        "on-error-container": "#ffdad6",
                        "surface-variant": "#2f3542",
                        "on-primary-fixed-variant": "#00504a",
                        "on-error": "#690005",
                        "on-secondary-container": "#ffe3c9",
                        "surface-container-lowest": "#080e1a",
                        "surface-container-highest": "#2f3542",
                        "primary-container": "#4fd1c5",
                        "primary-fixed": "#79f7ea",
                        "on-surface-variant": "#bbc9c7",
                        "tertiary-fixed-dim": "#ffb0cc",
                        "on-primary-fixed": "#00201d",
                        "outline-variant": "#3c4947",
                        "primary": "#6feee1",
                        "on-primary-container": "#005750",
                        "surface-container-low": "#161c27",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed": "#3e0021",
                        "on-secondary-fixed-variant": "#673d00",
                        "secondary": "#ffb866",
                        "inverse-surface": "#dde2f3",
                        "surface-container": "#1a202c",
                        "outline": "#869491",
                        "on-tertiary-container": "#842b54",
                        "on-surface": "#dde2f3",
                        "secondary-container": "#955b01",
                        "surface-bright": "#333946",
                        "surface": "#0d131f",
                        "on-tertiary-fixed-variant": "#7d254e",
                        "background": "#0d131f",
                        "surface-tint": "#5adace",
                        "inverse-on-surface": "#2a303d",
                        "primary-fixed-dim": "#5adace",
                        "secondary-fixed-dim": "#ffb866"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0d131f;
            color: #dde2f3;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface selection:bg-primary/30 min-h-screen pb-80">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 flex items-center justify-between w-[calc(100%-2rem)] max-w-7xl mx-auto rounded-full mt-4 mx-4 px-4 h-16 bg-[#0d131f]/60 backdrop-blur-xl shadow-[0_48px_48px_rgba(111,238,225,0.08)]">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#333946]/50 transition-colors active:scale-95 duration-200 text-[#bbc9c7]">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] tracking-[-0.04em] font-bold text-xl text-[#4fd1c5]">Add Transaction</h1>
</div>
<div class="flex items-center gap-2">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#333946]/50 transition-colors active:scale-95 duration-200 text-[#4fd1c5]">
<span class="material-symbols-outlined" data-icon="history">history</span>
</button>
</div>
</header>
<main class="max-w-xl mx-auto px-6 pt-8 pb-20 space-y-8">
<!-- Amount Hero Section -->
<section class="text-center space-y-2">
<label class="text-on-surface-variant font-medium text-sm tracking-wider uppercase">Amount</label>
<div class="flex items-center justify-center gap-2">
<span class="text-secondary text-4xl font-bold tracking-tighter">$</span>
<span class="text-7xl font-extrabold tracking-tighter text-on-surface animate-pulse-slow">0.00</span>
</div>
<button class="mt-4 mx-auto flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container-high text-on-surface-variant hover:text-primary transition-colors text-xs font-bold uppercase tracking-widest" id="toggle-keypad">
<span class="material-symbols-outlined text-sm">keyboard_hide</span>
                Hide Keypad
            </button>
</section>
<!-- Form Canvas -->
<div class="space-y-6">
<!-- Category Selector -->
<div class="space-y-4">
<div class="flex items-center justify-between px-2">
<h2 class="text-headline-md font-bold text-on-surface">Category</h2>
<span class="text-primary text-sm font-semibold">See all</span>
</div>
<div class="flex gap-4 pb-2 grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6">
<!-- Dining -->
<div class="flex flex-col items-center gap-2 group">
<div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center text-on-primary shadow-lg shadow-primary/20 active:scale-90 transition-transform cursor-pointer">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<span class="text-xs font-semibold text-primary">Dining</span>
</div>
<!-- Shopping -->
<div class="flex flex-col items-center gap-2 group">
<div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant hover:bg-surface-bright transition-colors active:scale-90 cursor-pointer">
<span class="material-symbols-outlined text-2xl">shopping_bag</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Shopping</span>
</div>
<!-- Travel -->
<div class="flex flex-col items-center gap-2 group">
<div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant hover:bg-surface-bright transition-colors active:scale-90 cursor-pointer">
<span class="material-symbols-outlined text-2xl">flight</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Travel</span>
</div>
<!-- Grocery -->
<div class="flex flex-col items-center gap-2 group">
<div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant hover:bg-surface-bright transition-colors active:scale-90 cursor-pointer">
<span class="material-symbols-outlined text-2xl">local_grocery_store</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Grocery</span>
</div>
<!-- Entertainment -->
<div class="flex flex-col items-center gap-2 group">
<div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant hover:bg-surface-bright transition-colors active:scale-90 cursor-pointer">
<span class="material-symbols-outlined text-2xl">theater_comedy</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Fun</span>
</div>
<!-- Add New Category -->
<div class="flex flex-col items-center gap-2 group">
<div class="w-16 h-16 rounded-full border-2 border-dashed border-outline-variant flex items-center justify-center text-outline-variant hover:border-primary hover:text-primary transition-all active:scale-90 cursor-pointer">
<span class="material-symbols-outlined text-2xl">add</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Add</span>
</div>
</div>
</div>
<!-- Contextual Fields Grid -->
<div class="grid grid-cols-1 gap-4">
<!-- Date Picker Field -->
<div class="bg-surface-container-low p-4 rounded-xl flex items-center gap-4 hover:bg-surface-container transition-colors cursor-pointer group">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
</div>
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">When</span>
<span class="text-on-surface font-semibold">Today, 4:20 PM</span>
</div>
</div>
</div>
<!-- Description Field -->
<div class="bg-surface-container-low p-5 rounded-xl space-y-2">
<label class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold px-1">Description</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline" data-icon="edit_note">edit_note</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-outline w-full p-0 font-medium" placeholder="What was this for?" type="text"/>
</div>
</div>
<!-- Calculator / Keypad Section -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest rounded-t-[32px] shadow-[0_-8px_32px_rgba(0,0,0,0.4)] z-50" id="calculator-keypad">
<!-- Keypad Grid -->
<div class="p-6 grid grid-cols-4 gap-2">
<!-- Row 1 -->
<button class="h-14 flex items-center justify-center text-xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all">1</button>
<button class="h-14 flex items-center justify-center text-xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all">2</button>
<button class="h-14 flex items-center justify-center text-xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all">3</button>
<button class="h-14 flex items-center justify-center text-on-surface-variant hover:bg-surface-container-low rounded-xl transition-all"><span class="material-symbols-outlined">backspace</span></button>
<!-- Row 2 -->
<button class="h-14 flex items-center justify-center text-xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all">4</button>
<button class="h-14 flex items-center justify-center text-xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all">5</button>
<button class="h-14 flex items-center justify-center text-xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all">6</button>
<button class="h-14 flex items-center justify-center text-2xl font-medium text-primary hover:bg-surface-container-low rounded-xl transition-all">+</button>
<!-- Row 3 -->
<button class="h-14 flex items-center justify-center text-xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all">7</button>
<button class="h-14 flex items-center justify-center text-xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all">8</button>
<button class="h-14 flex items-center justify-center text-xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all">9</button>
<button class="h-14 flex items-center justify-center text-2xl font-medium text-primary hover:bg-surface-container-low rounded-xl transition-all">−</button>
<!-- Row 4 -->
<button class="h-14 flex items-center justify-center text-xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all">.</button>
<button class="h-14 flex items-center justify-center text-xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all">0</button>
<button class="col-span-2 h-14 bg-primary text-on-primary font-bold rounded-xl hover:opacity-90 transition-all flex items-center justify-center">DONE</button>
</div>
<!-- Primary Action Button Container - Mimicking the spacing for Save Button -->
<div class="px-6 pb-8">
<div class="w-full h-16 opacity-0 pointer-events-none"></div>
</div>
</div>
</div>
</main>
<!-- Fixed Action Footer -->
<div class="fixed bottom-0 left-0 w-full px-6 pb-8 z-[60]">
<button class="w-full max-w-xl mx-auto flex items-center justify-center gap-3 h-16 rounded-full bg-gradient-to-r from-primary-container to-primary text-on-primary font-bold text-lg shadow-[0_24px_48px_rgba(111,238,225,0.2)] active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            Save Transaction
        </button>
</div>
</body></html>
