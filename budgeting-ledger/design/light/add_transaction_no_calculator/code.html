<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ledger - Add Transaction</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-dim": "#f1f5f9",
                        "inverse-primary": "#16B8A6",
                        "tertiary": "#ffa2c5",
                        "tertiary-container": "#ffd9e4",
                        "on-primary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#f1f5f9",
                        "on-background": "#0f172a",
                        "error-container": "#fee2e2",
                        "on-secondary-fixed": "#482900",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#ffd9e4",
                        "secondary-fixed": "#ffddba",
                        "on-error-container": "#991b1b",
                        "surface-variant": "#f1f5f9",
                        "on-primary-fixed-variant": "#00504a",
                        "on-error": "#ffffff",
                        "on-secondary-container": "#482900",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#e2e8f0",
                        "primary-container": "#ccfbf1",
                        "primary-fixed": "#99f6e4",
                        "on-surface-variant": "#64748b",
                        "tertiary-fixed-dim": "#ffb0cc",
                        "on-primary-fixed": "#00201d",
                        "outline-variant": "#e2e8f0",
                        "primary": "#16B8A6",
                        "on-primary-container": "#134e4a",
                        "surface-container-low": "#ffffff",
                        "error": "#ef4444",
                        "on-tertiary-fixed": "#3e0021",
                        "on-secondary-fixed-variant": "#673d00",
                        "secondary": "#f59e0b",
                        "inverse-surface": "#0f172a",
                        "surface-container": "#f8fafc",
                        "outline": "#94a3b8",
                        "on-tertiary-container": "#600b37",
                        "on-surface": "#0f172a",
                        "secondary-container": "#fef3c7",
                        "surface-bright": "#ffffff",
                        "surface": "#f8fafc",
                        "on-tertiary-fixed-variant": "#7d254e",
                        "background": "#f8fafc",
                        "surface-tint": "#16B8A6",
                        "inverse-on-surface": "#f8fafc",
                        "primary-fixed-dim": "#5eead4",
                        "secondary-fixed-dim": "#fcd34d"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-surface selection:bg-primary/30 min-h-screen pb-32">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 flex items-center justify-between w-[calc(100%-2rem)] max-w-7xl mx-auto rounded-full mt-4 mx-4 px-4 h-16 bg-white/60 backdrop-blur-xl shadow-sm border border-slate-200/50">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors active:scale-95 duration-200 text-slate-500">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] tracking-[-0.04em] font-bold text-xl text-primary">Add Transaction</h1>
</div>
<div class="flex items-center gap-2">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors active:scale-95 duration-200 text-primary">
<span class="material-symbols-outlined" data-icon="history">history</span>
</button>
</div>
</header>
<main class="max-w-xl mx-auto px-6 pt-8 pb-20 space-y-8">
<!-- Amount Hero Section -->
<section class="text-center space-y-2 relative group cursor-pointer" title="Click to edit amount">
<label class="text-on-surface-variant font-medium text-sm tracking-wider uppercase">Amount</label>
<div class="flex items-center justify-center gap-2">
<span class="text-secondary text-4xl font-bold tracking-tighter">$</span>
<span class="text-7xl font-extrabold tracking-tighter text-on-surface">0.00</span>
</div>
<!-- Show Calculator Toggle -->
<button class="mt-4 inline-flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container-highest hover:bg-slate-200 transition-colors text-primary text-xs font-bold uppercase tracking-widest shadow-sm">
<span class="material-symbols-outlined text-sm" data-icon="calculate">calculate</span>
                Show Calculator
            </button>
</section>
<!-- Form Canvas -->
<div class="space-y-8">
<!-- Category Selector -->
<div class="space-y-4">
<div class="flex items-center justify-between px-2">
<h2 class="text-xl font-bold text-on-surface">Category</h2>
<span class="text-primary text-sm font-semibold cursor-pointer">See all</span>
</div>
<div class="grid grid-cols-4 gap-4">
<!-- Dining (Selected) -->
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center text-on-primary shadow-lg shadow-primary/20 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="restaurant" style='font-variation-settings: "FILL" 1;'>restaurant</span>
</div>
<span class="text-xs font-semibold text-primary">Dining</span>
</div>
<!-- Shopping -->
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-16 h-16 rounded-full bg-white border border-slate-200 flex items-center justify-center text-on-surface-variant hover:bg-slate-50 transition-colors active:scale-90 shadow-sm">
<span class="material-symbols-outlined text-2xl" data-icon="shopping_bag">shopping_bag</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Shopping</span>
</div>
<!-- Travel -->
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-16 h-16 rounded-full bg-white border border-slate-200 flex items-center justify-center text-on-surface-variant hover:bg-slate-50 transition-colors active:scale-90 shadow-sm">
<span class="material-symbols-outlined text-2xl" data-icon="flight">flight</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Travel</span>
</div>
<!-- Grocery -->
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-16 h-16 rounded-full bg-white border border-slate-200 flex items-center justify-center text-on-surface-variant hover:bg-slate-50 transition-colors active:scale-90 shadow-sm">
<span class="material-symbols-outlined text-2xl" data-icon="local_grocery_store">local_grocery_store</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Grocery</span>
</div>
<!-- Entertainment -->
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-16 h-16 rounded-full bg-white border border-slate-200 flex items-center justify-center text-on-surface-variant hover:bg-slate-50 transition-colors active:scale-90 shadow-sm">
<span class="material-symbols-outlined text-2xl" data-icon="theater_comedy">theater_comedy</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Fun</span>
</div>
<!-- Health -->
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-16 h-16 rounded-full bg-white border border-slate-200 flex items-center justify-center text-on-surface-variant hover:bg-slate-50 transition-colors active:scale-90 shadow-sm">
<span class="material-symbols-outlined text-2xl" data-icon="medical_services">medical_services</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Health</span>
</div>
<!-- Car -->
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-16 h-16 rounded-full bg-white border border-slate-200 flex items-center justify-center text-on-surface-variant hover:bg-slate-50 transition-colors active:scale-90 shadow-sm">
<span class="material-symbols-outlined text-2xl" data-icon="directions_car">directions_car</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Car</span>
</div>
<!-- Add Custom -->
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-16 h-16 rounded-full border-2 border-dashed border-slate-300 flex items-center justify-center text-slate-400 hover:border-primary hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined text-2xl" data-icon="add">add</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Add</span>
</div>
</div>
</div>
<!-- Contextual Fields Grid -->
<div class="grid grid-cols-1 gap-4">
<!-- Date Picker Field -->
<div class="bg-white border border-slate-100 p-4 rounded-xl flex items-center gap-4 hover:bg-slate-50 transition-colors cursor-pointer group shadow-sm">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
</div>
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">WHEN</span>
<span class="text-on-surface font-semibold">Today, 4:20 PM</span>
</div>
</div>
</div>
<!-- Description & Notes -->
<div class="bg-white border border-slate-100 p-6 rounded-xl shadow-sm">
<div class="space-y-2">
<label class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold px-1">Description</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline" data-icon="edit_note">edit_note</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-slate-300 w-full p-0 font-medium text-lg" placeholder="What was this for?" type="text"/>
</div>
</div>
</div>
</div>
</main>
<!-- Fixed Action Footer -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-white/80 backdrop-blur-md z-40 border-t border-slate-100">
<button class="w-full max-w-xl mx-auto flex items-center justify-center gap-3 h-16 rounded-full bg-primary text-on-primary font-bold text-lg shadow-[0_12px_24px_rgba(22,184,166,0.25)] active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="check_circle" style='font-variation-settings: "FILL" 1;'>check_circle</span>
            Save Transaction
        </button>
</div>
</body></html>
